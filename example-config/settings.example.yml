# example-config/settings.example.yml
#
# This is an example configuration file for Mission Control's general settings.
# Copy this file to /app_data/config/settings.yml and customize it to your needs.
# Lines starting with '#' are comments and are ignored.

# 🌐 Web Server Configuration
port: 3000                            # Port on which the Mission Control web server will listen INSIDE the container.
                                      # This is the second part of the port mapping in docker-compose.yml (e.g., "HOST_PORT:3000").
                                      # If you change this, you must adjust the container port in your docker-compose.yml.

# 🎨 Theme Configuration
theme: "dark"                         # Default theme for the dashboard.
                                      # Options:
                                      # - "light": Light theme ☀️
                                      # - "dark": Dark theme 🌙
                                      # - "auto": Automatically selects light/dark based on your OS/browser preference 🌗

# 📡 MQTT Broker Configuration
# Used for real-time updates for widgets that support MQTT (e.g., MqttSubscriberWidget).
mqtt:
  # broker_url: "mqtt://localhost:1883" # REQUIRED if using MQTT: Full URL of your MQTT broker.
                                      # Examples:
                                      # - "mqtt://mosquitto:1883" (if 'mosquitto' is the service name in docker-compose on the same Docker network)
                                      # - "mqtt://192.168.1.100:1883" (if broker is on your LAN)
                                      # - "ws://192.168.1.100:9001" (for MQTT over WebSockets, often used by frontend)
                                      # - "mqtts://secure.broker.com:8883" (for MQTT over TLS/SSL)
                                      # - "wss://secure.broker.com:9002" (for MQTT over Secure WebSockets)
  username: ""                        # Optional: Username for MQTT broker authentication. Leave blank or remove if none.
  password: ""                        # Optional: Password for MQTT broker authentication. Leave blank or remove if none.
  
  client_id_prefix: "missioncontrol"  # Optional: Prefix for MQTT client IDs generated by the application.
                                      # Backend might append a unique suffix (e.g., missioncontrol-backend-xyz123).
                                      # Frontend might also use this or generate its own.

  # enable: true                      # Optional: Explicitly enable/disable MQTT. Defaults to true if broker_url is set.

  # --- Advanced TLS/SSL Options for MQTT (for mqtts:// or wss:// connections) ---
  # These are typically needed if your broker uses a self-signed certificate, a private CA,
  # or requires client certificate authentication.
  # Paths should be accessible from within the Mission Control Docker container (e.g., mount them into /app/config).

  # tls_enabled: false                # Set to true to enable specific TLS options below.
                                      # If your broker uses a certificate from a well-known public CA (e.g., Let's Encrypt),
                                      # you might not need to set ca_file, cert_file, or key_file. The client should trust it by default.

  # ca_file: "mqtt_ca.crt"            # Optional: Path to the CA certificate file (e.g., /app/config/mqtt_ca.crt).
                                      # Use if your broker's certificate is signed by a private CA or is self-signed.

  # cert_file: "mqtt_client.crt"      # Optional: Path to the client certificate file for mutual TLS authentication.
  # key_file: "mqtt_client.key"       # Optional: Path to the client private key file for mutual TLS authentication.

  # reject_unauthorized: true         # Optional (defaults to true if not set when tls_enabled is true).
                                      # Set to false ONLY for testing with self-signed certificates if you haven't provided a ca_file
                                      # and understand the security implications (disables server certificate validation).
                                      # For production, always use true with a proper CA or a public CA.

  # --- MQTT.js specific options (passed through to the client if structured under 'options') ---
  # options:                          # Optional: Pass any other MQTT.js specific connection options.
    # keepalive: 60                   # Keepalive interval in seconds.
    # reconnectPeriod: 5000           # Milliseconds between two reconnect attempts.
    # connectTimeout: 10000           # Milliseconds to wait for CONNACK.
    # clean: true                     # Clean session flag.

# (Optional) Application Title - This can also be set in dashboard.yml's pageInfo.
# If set here, it might serve as a global default if dashboard.yml doesn't specify one.
# app_title: "My Custom Mission Control"

# (Optional) Logging Configuration for the Backend
logging:
  level: "info"                     # Logging level for the backend application.
                                      # Options: "error", "warn", "info", "debug", "trace"
                                      # "debug" or "trace" can be helpful for troubleshooting.

# (Optional) Custom CSS File for Theming
# The application will look for this file in the /app/config directory.
# custom_css_file: "custom.css"       # Defaults to "custom.css" if this key is omitted and the file exists.
                                      # Set to "" (empty string) or false to disable loading custom.css.

# (Optional) Grid Layout Defaults for vue-grid-layout (if you want to configure them globally)
# These would be used by DashboardView.vue if not hardcoded there.
# grid_layout_defaults:
#   cols: # Number of columns for each breakpoint
#     lg: 12
#     md: 10
#     sm: 6
#     xs: 4
#     xxs: 2
#   breakpoints: # Breakpoint widths in pixels
#     lg: 1200
#     md: 996
#     sm: 768
#     xs: 480
#     xxs: 0
#   row_height: 30 # Default height of a single row in pixels
#   margin: [10, 10] # Default margin [horizontal, vertical] in pixels
